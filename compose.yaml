# This Docker Compose file is for education purpose only and it contains all necessary components 
# to instantiate one Oracle GoldenGate 26 instance and two Oracle Database 26 Free instances

# This yaml file will create 5 docker containers:
#   1- Two Oracle Goldengate 26 Hub (WEST and EAST)
#   2- One Oracle Database 26  (Named: West)
#   3- One Oracle Database 26  (Named: East)
#   4- One Oracle GoldenGate Veridata 26.5

# To connect to goldengate and databases you can go to:
#  GG Microservices: https://localhost:9090  [ user: oggadmin, password: Welcome##123 ]
#  GG Microservices: https://localhost:8080  [ user: oggadmin, password: Welcome##123 ]
#  GG Veridata: http://localhost:8831/veridata  [ user: <veridata_user>, password: Welcome!1 ]
#  GG InfluxDB: http://localhost:8806  [ user: admin, password: Welcome##123 ]
#  GG Grafana: http://localhost:3000  [ user: admin, password: Welcome##123 ]
#
#  Database Service West for SQL Developer: localhost:1534/FREEPDB1  [ sys password: Welcome##123 ]
#  Database Service East for SQL Developer: localhost:1535/FREEPDB1  [ sys password: Welcome##123 ]
#
#  Internal ports all all the same: 1521
#  Database Service West for GoldenGate: <IP>:1521/FREEPDB1  [ oggadmin password: Welcome##123 ]
#  Database Service East for GoldenGate: <IP>:1521/FREEPDB1  [ oggadmin password: Welcome##123 ]

# Sample HR schema is installed on both databases

#version: '3.8'
services:
# Create GoldenGate HUB Instance
  ggw:
    container_name: oggWEST
    hostname: oggWEST
    image: container-registry.oracle.com/goldengate/goldengate-oracle:latest
    ports:
      - "9090:8443"
      - "9091:9012"
    deploy:
      resources:
          limits:
            cpus: '4.0'
            memory: 8192M
          reservations:
            cpus: '4.0'
            memory: 8192M
    env_file:
      - .env
    environment:
      - OGG_DEPLOYMENT=WEST    
    networks:
      ogg_docker_network_v1:
        ipv4_address: ${DOCKER_OGG_WEST_IP}
    volumes:
      - ${PWD}/cert:/etc/nginx/cert:rw
    #platform: "linux/x86_64"
    platform: linux/amd64

  gge:
    container_name: oggEAST
    hostname: oggEAST
    image: container-registry.oracle.com/goldengate/goldengate-oracle:latest
    ports:
      - "8080:8443"
      - "8081:9012"
    deploy:
      resources:
          limits:
            cpus: '4.0'
            memory: 8192M
          reservations:
            cpus: '4.0'
            memory: 8192M
    env_file:
      - .env
    environment:
      - OGG_DEPLOYMENT=EAST  
    networks:
      ogg_docker_network_v1:
        ipv4_address: ${DOCKER_OGG_EAST_IP}
    volumes:
      - ${PWD}/cert:/etc/nginx/cert:rw
    #platform: "linux/x86_64"
    platform: linux/amd64

# Create WEST Side Database 26.8 Free
  databaseW:
    container_name: dbWEST
    hostname: dbWEST
    #image: iad.ocir.io/paasdevgg/alima-ocr/db_free_slim_ogg:latest
    image: container-registry.oracle.com/database/free:23.26.1.0-lite-arm64
    #image: alexlima/db_free_slim_ogg:latest
    ports:
      - "1534:1521"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      ogg_docker_network_v1:
        ipv4_address: ${DOCKER_DB_WEST_IP}
    platform: "linux/arm64"

# Create EAST Side Database 26.8 Free
  databaseE:
    container_name: dbEAST
    hostname: dbEAST
    #image: iad.ocir.io/paasdevgg/alima-ocr/db_free_slim_ogg:latest
    image: container-registry.oracle.com/database/free:23.26.1.0-lite-arm64
    #image: alexlima/db_free_slim_ogg:latest
    ports:
      - "1535:1521"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      ogg_docker_network_v1:
        ipv4_address: ${DOCKER_DB_EAST_IP}
    platform: "linux/arm64"

# Oracle GoldenGate Veridata
  veridata:
    container_name: oggvdt
    hostname: oggvdt
    #image: oracle/oggvdt:23.5.0.0
    #image: iad.ocir.io/paasdevgg/alima-ocr/veridata:23.26.1.0.1
    image: container-registry.oracle.com/goldengate/goldengate-veridata:23.26.1.0.1
    ports:
      - "8831:8831"
    # Applies with `docker compose up`
    cpus: "4.0"          # try 1.0 first; drop to 0.5 if you want it very “background”
    mem_limit: "8192m"
    mem_reservation: "4096m"
    cpu_shares: 128      # lower priority vs other containers (default is 1024)  

    env_file:
      - vdt.env
    restart: unless-stopped
    networks:
      ogg_docker_network_v1:
        ipv4_address: ${DOCKER_VERIDATA_IP}
    entrypoint: ["/bin/bash", "/usr/local/bin/vdt-entrypoint.sh"]
    volumes:
      - veridata_data:/u01/vdt
      - ${PWD}/vdt-entrypoint.sh:/usr/local/bin/vdt-entrypoint.sh:ro
    
      #- veridata_mysql:/u01/vdt/mysql-commercial-8.0.42-linux-glibc2.17-x86_64-minimal
    #  - veridata_data:/opt/oracle/veridata
    #platform: "linux/x86_64"
    platform: linux/amd64
    
